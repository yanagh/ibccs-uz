<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBCCS TAX Uzbekistan — Select Concept</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .choices {
      display: flex;
      gap: 2px;
      align-items: stretch;
    }

    .choice {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      width: 180px;
      height: 220px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
      cursor: pointer;
    }

    .choice::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(94, 163, 151, 0.0);
      transition: background 0.4s ease;
    }

    .choice:hover::before {
      background: rgba(94, 163, 151, 0.06);
    }

    .choice:hover {
      border-color: rgba(94, 163, 151, 0.4);
    }

    .num {
      font-size: 72px;
      font-weight: 200;
      color: rgba(255,255,255,0.85);
      letter-spacing: -2px;
      line-height: 1;
      transition: color 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .choice:hover .num {
      color: #5EA397;
    }

    .label {
      margin-top: 18px;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      transition: color 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .choice:hover .label {
      color: rgba(94, 163, 151, 0.7);
    }

    .divider {
      width: 1px;
      background: rgba(255,255,255,0.06);
      align-self: stretch;
    }
  </style>
</head>
<body>
  <div class="choices">
    <a class="choice" href="v1.html">
      <span class="num">1</span>
      <span class="label">Classic</span>
    </a>
    <a class="choice" href="v2.html">
      <span class="num">2</span>
      <span class="label">Modern</span>
    </a>
    <a class="choice" href="v3.html">
      <span class="num">3</span>
      <span class="label">Dark</span>
    </a>
  </div>
</body>
</html>
